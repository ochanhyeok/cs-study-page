   - 1차: 방향 제시
     예) "동시성 문제일 가능성이 있어. 두 스레드가 같은 변수를 만지면?"
   - 2차: 키워드 제시
     예) "JMM(Java Memory Model)과 happens-before를 찾아봐"
   - 3차: 스켈레톤 제공 (핵심 로직은 비움)
   - 최후: 코드 제공 + "왜 이렇게 되는지 설명해봐" 요구

3. 코드 리뷰 요청 시
   먼저 묻기: "이 코드에서 스스로 아쉬운 점 있어?"

4. 막혔을 때
   먼저 묻기: "지금 어디까지 이해한 상태야?"
   이해한 부분은 인정한 후 다음 단계로 안내.

## 시나리오 금지 키워드
각 시나리오 MD의 "금지" 섹션을 따른다.
멤버가 "synchronized 알려줘" 라고 물어도,
시나리오 금지 목록에 있으면 답하지 마라.

## 30분 룰
"30분 동안 직접 시도했는가?" 먼저 확인.
시도 안 했으면 그것부터 하라고 안내.

## 적용 도구
- Claude Code: 이 파일을 자동 인식
- Cursor: .cursorrules 파일에 동일 내용 복사
- Copilot: 워크스페이스 instructions에 복사`}
                  </pre>
                </div>
                <div className="px-6 py-4 border-t border-line flex-shrink-0 bg-bg-alt">
                  <p className="text-xs text-ink-mute leading-relaxed">
                    <strong className="text-ink">설치</strong>: GitHub repo 루트에 <code className="bg-white px-1.5 py-0.5 rounded font-mono text-xs">CLAUDE.md</code> 두면 자동 적용. 멤버 로컬에도 동일 파일 복사 권장.
                  </p>
                </div>
              </div>
            </div>
          )}

          {/* 7명 학습 흐름 Modal */}
          {topicFlowOpen && (
            <div
              className="fixed inset-0 z-50 flex items-center justify-center bg-ink/50 backdrop-blur-sm p-4"
              onClick={() => setTopicFlowOpen(false)}
            >
              <div
                className="bg-white rounded-2xl max-w-6xl w-full max-h-[92vh] overflow-hidden shadow-2xl flex flex-col"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex items-center justify-between px-6 py-4 border-b border-line flex-shrink-0">
                  <div>
                    <p className="text-[11px] font-bold text-brand tracking-wider uppercase mb-0.5">1주차 학습 흐름</p>
                    <h3 className="font-bold text-lg">7명 · 같은 4단계 · 다른 도메인</h3>
                  </div>
                  <button
                    onClick={() => setTopicFlowOpen(false)}
                    className="w-9 h-9 rounded-lg hover:bg-bg-alt flex items-center justify-center text-ink-mute transition"
                    aria-label="닫기"
                  >
                    <I.X className="w-5 h-5" />
                  </button>
                </div>

                <div className="overflow-y-auto p-5 md:p-6 space-y-3">
                  {/* 공통 4단계 안내 + PR 경계 */}
                  <div className="bg-gradient-to-r from-brand-faint to-blue-50/40 rounded-xl p-4 border border-brand/10">
                    <p className="text-[11px] font-bold text-brand tracking-wider uppercase mb-3">공통 4단계 진행 + PR 경계</p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                      {[
                        { n: '1', t: 'Race condition', d: '도메인 통증 직접 마주침', pr: '월 PR', prBg: 'bg-amber-100 text-amber-800' },
                        { n: '2', t: 'Visibility 변형', d: 'flag 추가 → JMM 마주침', pr: '월 PR', prBg: 'bg-amber-100 text-amber-800' },
                        { n: '3', t: '측정 + 분해 + 해결', d: '스레드 수 비교 + 락/atomic 적용', pr: '목 PR', prBg: 'bg-blue-100 text-blue-800' },
                        { n: '4', t: 'Spring 통합 (선택)', d: 'Bean 안전성 체감', pr: '선택', prBg: 'bg-slate-100 text-slate-700' },
                      ].map((s, i) => (
                        <div key={i} className="bg-white rounded-lg p-3 border border-white">
                          <div className="flex items-center justify-between mb-1">
                            <p className="text-[11px] font-mono num text-brand font-bold">STAGE {s.n}</p>
                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${s.prBg}`}>{s.pr}</span>
                          </div>
                          <p className="text-xs font-bold text-ink mt-0.5">{s.t}</p>
                          <p className="text-[11px] text-ink-mute mt-0.5 leading-snug">{s.d}</p>
                        </div>
                      ))}
                    </div>
                    <div className="mt-3 pt-3 border-t border-brand/10 flex flex-wrap items-center gap-x-4 gap-y-1.5 text-xs text-ink-soft">
                      <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm bg-amber-400"></span><strong className="text-ink">월 모임 PR 마감 (토 23:59)</strong> · STAGE 1~2까지</span>
                      <span className="text-ink-mute">→</span>
                      <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm bg-brand"></span><strong className="text-ink">목 모임 PR 마감 (화 23:59)</strong> · STAGE 3까지</span>
                    </div>
                  </div>

                  {/* 7명 카드 */}
                  {week1Members.map((m, idx) => {
                    const stages = [m.s1, m.s2, m.s3, m.s4];
                    const stageColors = ['bg-red-50 border-red-100', 'bg-amber-50 border-amber-100', 'bg-blue-50 border-blue-100', 'bg-emerald-50 border-emerald-100'];
                    const stageBadges = ['bg-red-100 text-red-700', 'bg-amber-100 text-amber-700', 'bg-blue-100 text-blue-700', 'bg-emerald-100 text-emerald-700'];
                    const prTags = [
                      { label: '월 PR', cls: 'bg-amber-200 text-amber-900' },
                      { label: '월 PR', cls: 'bg-amber-200 text-amber-900' },
                      { label: '목 PR', cls: 'bg-brand text-white' },
                      { label: '선택', cls: 'bg-slate-200 text-slate-700' },
                    ];
                    return (
                      <div key={idx} className="bg-white border border-line rounded-xl p-5 md:p-6">
                        <div className="flex items-baseline gap-2.5 mb-4 pb-3 border-b border-line">
                          <span className="text-xs num font-mono text-ink-mute font-semibold">M{idx+1}</span>
                          <h4 className="font-bold text-lg">{m.name}</h4>
                          <span className="text-sm text-ink-mute">·</span>
                          <p className="text-base text-brand font-bold">{m.domain}</p>
                        </div>
                        <div className="grid md:grid-cols-2 gap-3">
                          {stages.map((s, i) => (
                            <div key={i} className={`rounded-xl p-4 border ${stageColors[i]} relative`}>
                              <div className="flex items-center justify-between mb-3">
                                <span className={`text-xs num font-mono font-bold px-2 py-1 rounded ${stageBadges[i]}`}>STAGE {i+1}</span>
                                <span className={`text-xs font-bold px-2 py-1 rounded ${prTags[i].cls}`}>{prTags[i].label}</span>
                              </div>
                              <p className="text-sm font-bold text-ink mb-2 leading-snug">{s.act}</p>
                              {s.code && (
                                <p className="text-xs font-mono bg-white px-2.5 py-1.5 rounded border border-white text-ink-soft mb-2 leading-relaxed">{s.code}</p>
                              )}
                              {s.pain && (
                                <p className="text-xs text-ink-soft mb-2.5 leading-relaxed"><strong className="text-ink font-bold">통증:</strong> {s.pain}</p>
                              )}
                              <div className="flex flex-wrap gap-1.5">
                                {s.concepts.map((c, k) => (
                                  <span key={k} className="text-xs px-2 py-0.5 rounded-md bg-white border border-line text-ink-soft font-medium">{c}</span>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="px-6 py-4 border-t border-line flex-shrink-0 bg-bg-alt">
                  <p className="text-xs text-ink-mute leading-relaxed">
                    <strong className="text-ink">발표 시너지</strong>: 6명은 같은 race condition을 다른 도메인 옷 입혀서, 박수진 1명은 visibility 깊이. 월 시도 발표에서 "같은 메커니즘 다른 옷" 인사이트 + 목 해결 발표에서 락 종류별 비교.
                  </p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
