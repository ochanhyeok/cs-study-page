<body class="bg-bg-base text-ink">

  <script type="text/babel" data-presets="env,react">
    const I = {

      ArrowRight: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
      Check: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      GitPullRequest: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>,
      Target: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      MessageSquare: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      X: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      FileText: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Users: ({ className = "w-5 h-5" }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    };

    const App = () => {
      const [activeSection, setActiveSection] = React.useState('cycle');

      const tocItems = [
        { id: 'cycle', label: '학습 사이클', sub: [] },
        { id: 'curriculum', label: '커리큘럼', sub: [
          { id: 'curriculum-overview', label: '12주 한눈에' },
          { id: 'phase-1', label: 'Phase 1 · 동시성' },
          { id: 'phase-2', label: 'Phase 2 · Spring' },
          { id: 'phase-3', label: 'Phase 3 · 데이터' },
          { id: 'phase-4', label: 'Phase 4 · 운영' },
        ] },
        { id: 'weekly', label: '매주 모임', sub: [
          { id: 'weekly-flow', label: '한 주제 흐름' },
          { id: 'weekly-mon', label: '월 모임' },
          { id: 'weekly-thu', label: '목 모임' },
        ] },
      ];

      React.useEffect(() => {
        const allIds = tocItems.flatMap(it => [it.id, ...it.sub.map(s => s.id)]);
        const observer = new IntersectionObserver(
          (entries) => {
            const visible = entries
              .filter(e => e.isIntersecting)
              .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
            if (visible.length > 0) {
              setActiveSection(visible[0].target.id);
            }
          },
          { rootMargin: '-25% 0px -55% 0px', threshold: [0, 0.25, 0.5, 1] }
        );
        allIds.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const isActive = (id) => activeSection === id;
      const isParentActive = (item) => isActive(item.id) || item.sub.some(s => isActive(s.id));


      const phases = [
        {
          n: '1', weeks: '1–3주', wkCount: 3, title: '동시성과 트랜잭션', cycle: '주 1주제 · 모임 2번',
          tlBg: 'bg-brand text-white',
          why: '신입 90%가 무너지는 영역. 토스증권/카뱅 면접의 메인 사냥감입니다.',
          topics: [
            { w: '1주', t: 'JVM 메모리 모델 & 스레드',
              goal: '멀티스레드 환경에서 본인 도메인의 race condition 직접 재현',
              cs: '프로세스 vs 스레드, 컨텍스트 스위칭, 뮤텍스/세마포어, JVM 메모리 영역',
              q: 'synchronized vs volatile 차이 / JVM 메모리 영역 5가지 / 스레드 안전이란' },
            { w: '2주', t: '트랜잭션 / 격리 수준',
              goal: 'DB race 재현 (DBeaver 두 세션 손으로) + 격리 수준 RC/RR/SR 트레이드오프 측정',
              cs: 'ACID, 격리 수준 4 단계, MVCC, RMW Lost Update, row-level lock, 데드락 (40P01)',
              q: '격리 수준별 차단되는 이상 현상 / PG REPEATABLE READ vs MySQL / 트랜잭션만으론 RMW Lost Update 안 막히는 이유' },
            { w: '3주', t: '락 (DB락 + 분산락)',
              goal: '비관적/낙관적/분산락 시나리오별 구현 + 데드락 재현',
              cs: '데드락 4조건, 식사하는 철학자',
              q: '동시 매수 잔고 음수 방지 / Redis 분산락 vs DB락 / 데드락 발생 조건' },
          ]
        },
        {
          n: '2', weeks: '4–6주', wkCount: 3, title: 'Spring 내부 풀어보기', cycle: '주 1주제',
          tlBg: 'bg-indigo-500 text-white',
          why: 'Spring이 내 코드를 가로채는 메커니즘. 면접에서 깊이 묻는 단골 주제.',
          topics: [
            { w: '4주', t: 'IoC 컨테이너 & 빈 생명주기',
              goal: 'Spring 빈이 만들어지는 순서를 로그로 직접 추적',
              cs: 'SOLID 5원칙, 의존성 역전 원칙',
              q: 'IoC와 DI 차이 / 빈 스코프 종류 / @PostConstruct 호출 시점' },
            { w: '5주', t: '프록시 & AOP',
              goal: '@Transactional이 self-invocation에서 안 먹는 이유 직접 재현',
              cs: '프록시 · 데코레이터 · 책임 연쇄 패턴',
              q: 'JDK 프록시 vs CGLIB / @Transactional 동작 안 되는 케이스 / AOP weaving 시점' },
            { w: '6주', t: '이벤트 기반 아키텍처',
              goal: 'ApplicationEventPublisher로 도메인 분리 + Kafka 비교',
              cs: '동기 vs 비동기, 옵저버 패턴, 메시지 큐',
              q: '트랜잭션과 이벤트 발행 순서 / @TransactionalEventListener 시점' },
          ]
        },
        {
          n: '3', weeks: '7–9주', wkCount: 3, title: '데이터 계층', cycle: '주 1주제',
          tlBg: 'bg-purple-500 text-white',
          why: '토스 · 카카오 · 네이버 백엔드 면접의 90%. 손으로 깨뜨려본 사람만 답할 수 있음.',
          topics: [
            { w: '7주', t: 'JPA 영속성 & N+1',
              goal: 'N+1 문제 발생시키고 fetch join · EntityGraph 비교',
              cs: '조인 종류, 카디널리티, 1:N 관계',
              q: '영속성 컨텍스트 1차 캐시 / N+1 해결 3가지 / @OneToMany 기본 fetch' },
            { w: '8주', t: '인덱스 & 쿼리 최적화',
              goal: '100만 건 데이터로 인덱스 유무 쿼리 시간 측정',
              cs: 'B-tree vs Hash, 시간복잡도, 디스크 I/O',
              q: '인덱스 동작 원리 / 복합 인덱스 순서 / explain analyze 보는 법' },
            { w: '9주', t: '캐시 (로컬 + 분산)',
              goal: 'Caffeine 로컬 캐시 + Redis 분산 캐시 처리량 비교',
              cs: '메모리 계층, LRU/LFU, 페이지 캐시',
              q: '캐시 일관성 / TTL 정하는 기준 / 캐시 무효화 전략' },
          ]
        },
        {
          n: '4', weeks: '10–12주', wkCount: 3, title: '네트워크 · 인증 · 관측성', cycle: '주 1주제',
          tlBg: 'bg-cyan-500 text-white',
          why: '브라우저에서 서버까지 모든 길목 + 운영의 눈과 귀. 보안과 성능의 첫 방어선.',
          topics: [
            { w: '10주', t: 'HTTP & 커넥션풀',
              goal: 'HikariCP 풀 사이즈에 따른 처리량 변화 직접 측정',
              cs: 'OSI 7계층, TCP/UDP, 3-way handshake',
              q: 'HTTP/1.1 vs HTTP/2 / 커넥션 풀 사이즈 결정 기준 / Keep-Alive' },
            { w: '11주', t: '인증/인가 (Session vs JWT)',
              goal: 'Session 방식과 JWT 방식 둘 다 구현해서 비교',
              cs: '대칭/비대칭 암호화, 해시/솔트, 쿠키 vs 세션 vs 토큰',
              q: 'JWT 단점 / RefreshToken 왜 필요 / OAuth 동작 흐름' },
            { w: '12주', t: '관측성 (로깅 · 메트릭 · 트레이싱)',
              goal: '마이크로미터 + Prometheus + 분산 트레이싱 직접 붙이기',
              cs: '분산 시스템, CAP 정리, 가용성 vs 일관성',
              q: '로그 레벨 기준 / 분산 트레이싱 왜 필요 / 메트릭/로그/트레이스 차이' },
          ]
        },
      ];

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="sticky top-0 z-40 backdrop-blur-md bg-white/85 border-b border-line">
            <div className="max-w-5xl mx-auto px-6 h-14 flex items-center">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-md bg-brand flex items-center justify-center text-white font-bold text-xs">CS</div>
                <span className="font-bold text-sm tracking-tight">CS Study</span>
              </div>
            </div>
          </header>

          {/* 우측 플로팅 목차 (Notion 스타일, lg+ 에서만 표시) */}
          <aside className="hidden xl:block fixed right-8 top-24 w-56 z-30">
            <div className="border-l border-line pl-4">
              <p className="text-[10px] font-bold text-ink-mute tracking-wider uppercase mb-3">목차</p>
              <ul className="space-y-0.5">
                {tocItems.map((item) => (
                  <li key={item.id}>
                    <a
                      href={`#${item.id}`}
                      className={`block py-1 text-xs transition ${isParentActive(item) ? 'text-brand font-semibold' : 'text-ink-mute hover:text-ink'}`}
                    >
                      {item.label}
                    </a>
                    {item.sub.length > 0 && isParentActive(item) && (
                      <ul className="ml-2 mt-1 mb-2 space-y-0.5 border-l border-line">
                        {item.sub.map((sub) => (
                          <li key={sub.id}>
                            <a
                              href={`#${sub.id}`}
                              className={`block pl-3 py-0.5 text-[11px] transition ${isActive(sub.id) ? 'text-brand font-medium' : 'text-ink-mute hover:text-ink'}`}
                            >
                              {sub.label}
                            </a>
                          </li>
                        ))}
                      </ul>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </aside>

          {/* Hero */}
          <section className="border-b border-line">
            <div className="max-w-5xl mx-auto px-6 py-20 md:py-28">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-faint text-brand text-xs font-bold mb-6">
                <span className="w-1.5 h-1.5 rounded-full bg-brand animate-pulse"></span>
                7명 · 곧 시작
              </div>
              <h1 className="text-2xl md:text-3xl font-bold tracking-tight leading-[1.2] mb-4">
                12주 동안 <span className="gradient-text">직접 깨뜨리고 풀어내는</span> CS 스터디
              </h1>
              <p className="text-base md:text-lg text-ink-soft mb-8 max-w-xl leading-relaxed">
                책으로 외운 답변은 면접관이 한 마디로 알아챕니다. 통증을 직접 겪은 사람만 진짜 강점이 됩니다.
              </p>
              <div className="flex flex-wrap gap-x-8 gap-y-3 text-sm">
                <div><span className="block text-3xl font-bold text-ink num leading-none mb-1">12<span className="text-base text-ink-mute font-medium ml-0.5">주</span></span><span className="text-ink-mute">약 3개월</span></div>
                <div><span className="block text-3xl font-bold text-ink num leading-none mb-1">12</span><span className="text-ink-mute">핵심 주제</span></div>
                <div><span className="block text-3xl font-bold text-ink num leading-none mb-1">7<span className="text-base text-ink-mute font-medium ml-0.5">명</span></span><span className="text-ink-mute">한 자리 한 사람</span></div>
                <div><span className="block text-3xl font-bold text-ink num leading-none mb-1">4<span className="text-base text-ink-mute font-medium ml-0.5">시간 / 주</span></span><span className="text-ink-mute">매주 2회 (월/목)</span></div>
              </div>
            </div>
          </section>

          {/* Learning cycle */}
          <section id="cycle" className="py-20 md:py-24 border-b border-line">
            <div className="max-w-5xl mx-auto px-6">
              <div className="mb-12 text-center">
                <p className="text-xs font-bold text-brand mb-2 tracking-wider uppercase">한 주제의 흐름</p>
                <h2 className="text-2xl md:text-3xl font-bold tracking-tight">한 주에 4단계로 깊어진다</h2>
                <p className="text-sm text-ink-mute mt-3">매주 같은 패턴. 12주 동안 12번 반복.</p>
              </div>

              {/* 메인 시각화: 4단계 stations */}
              <div className="bg-white rounded-2xl border border-line p-6 md:p-10">
                {/* 단계 카드 4개 (커넥팅 라인 포함) */}
                <div className="relative">
                  {/* 데스크탑: 가로 연결선 */}
                  <div className="hidden md:block absolute top-7 left-[10%] right-[10%] h-px bg-line"></div>
                  <div className="hidden md:block absolute top-7 left-[10%] right-[35%] h-px bg-brand"></div>

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-6 md:gap-2 relative">
                    {[
                      { n: 's1', step: '겪기', sub: '문제 재현', when: '금~일 작업', whenTag: '겪기 단계', ex: '쿠폰 100개에 200명 동시 신청 → 105개 발급. race 확인.', required: true },
                      { n: 's2', step: '겪기 (확장)', sub: '다른 각도', when: '금~일 작업', whenTag: '겪기 단계', ex: '마감 플래그 추가 → 다른 스레드에서 안 보임. visibility 만남.', required: true },
                      { n: 's3', step: '코드', sub: '측정 + 풀이', when: '화~수 작업', whenTag: '코드 단계', ex: '스레드 50/100/1000 측정 후 AtomicInteger. 5회 평균 0건.', required: true },
                      { n: 's4', step: '응용', sub: '확장 (선택)', when: '여유 있으면', whenTag: '선택', ex: '같은 race를 Java 21 가상 스레드 1만 개로 재현. (4주차+에선 Spring 통합으로 바뀜)', required: false },
